apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- hpa-backend.yaml
- hpa-frontend.yaml

# Account ID is intentionally NOT hardcoded here.
# CI (deploy stage) overwrites these from secrets.AWS_ACCOUNT_ID every push:
#   kustomize edit set image bookstore-backend=${ECR_REGISTRY}/bookstore-backend:${SHA}
# Placeholder 000000000000 is replaced automatically on first CI deploy.
# For manual local deploy: replace 000000000000 with your real AWS account ID.
images:
- name: bookstore-backend
  newName: 000000000000.dkr.ecr.us-west-1.amazonaws.com/bookstore-backend
  newTag: latest
- name: bookstore-frontend
  newName: 000000000000.dkr.ecr.us-west-1.amazonaws.com/bookstore-frontend
  newTag: latest

patches:
- target:
    group: argoproj.io
    version: v1alpha1
    kind: Rollout
    name: backend
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: "128m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"
- target:
    group: cert-manager.io
    version: v1
    kind: ClusterIssuer
    name: letsencrypt-prod
  patch: |-
    - op: replace
      path: /spec/acme/email
      value: kandukurisaikrishna778@gmail.com
